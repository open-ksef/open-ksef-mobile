name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    if: |
      (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
      github.event_name == 'pull_request_target'
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "cla-signatures.json"
          path-to-document: "https://github.com/${{ github.repository }}/blob/main/CLA.md"
          branch: "cla-signatures"
          allowlist: bot*
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this pull request,
            we need you to sign our **Contributor License Agreement (CLA)**.

            Please read the [CLA document](https://github.com/${{ github.repository }}/blob/main/CLA.md)
            and then reply to this comment with the exact text below to sign:

            > I have read the CLA Document and I hereby sign the CLA

            This is required to allow the project maintainers to offer OpenKSeF
            under both the open-source [Elastic License 2.0](https://github.com/${{ github.repository }}/blob/main/LICENSE)
            and commercial licensing terms.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-prcomment: "All contributors have signed the CLA. Thank you!"
